name: Python CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python files
        run: |
          python -m py_compile \
            ingest_lib.py \
            ingest_url.py \
            ingest_pdf.py \
            ingest_pipeline.py \
            wiki_search.py \
            wiki_healthcheck.py \
            tools/wiki_tool.py

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -v
